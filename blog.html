        .gradient-text { background: linear-gradient(135deg, #8f00cc 0%, #cc44ff 50%, #8f00cc 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: gradientFlow 4s ease infinite; }
        @keyframes gradientFlow { 0%,100% { background-position: 0% center; } 50% { background-position: 100% center; } }

        .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #8f00cc; transition: width 0.3s; border-radius: 1px; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        .blog-card:hover { transform: translateY(-6px); }
    </style>
    <script type="application/ld+json">

<body class="bg-white text-gray-900 font-sans transition-colors duration-500">
    <div id="axo-loader" style="position:fixed;inset:0;z-index:9999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.4s ease,visibility 0.4s ease">
        <span style="font-size:1.75rem;font-weight:800;font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em;background:linear-gradient(135deg,#8f00cc,#cc44ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Axolutions</span>
        <div style="width:32px;height:32px;border:3px solid rgba(143,0,204,0.15);border-top-color:#8f00cc;border-radius:50%;animation:axo-spin 0.7s linear infinite"></div>

    </div>

    <!-- HEADER -->
    <section class="pt-40 pb-52 px-4 bg-[#07070f] relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,rgba(143,0,204,0.25),transparent_60%)] pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-white to-transparent pointer-events-none z-10"></div>
        <div class="max-w-7xl mx-auto text-center relative z-10">
            <div class="inline-flex items-center gap-2 bg-white/5 backdrop-blur-sm border border-white/10 rounded-full px-5 py-2 mb-6">
                <div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
                <span class="text-xs font-semibold text-primary uppercase tracking-wider">Nosso Blog</span>
            </div>
            <h1 class="text-4xl lg:text-6xl font-display font-bold mt-2 text-white">Artigos e <span class="gradient-text">Novidades</span></h1>
            <p class="text-white/60 mt-5 max-w-2xl mx-auto text-lg leading-relaxed">Dicas, tutoriais e insights sobre desenvolvimento, tecnologia e inovação digital.</p>

            <!-- SEARCH -->
            <div class="mt-10 max-w-xl mx-auto relative">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input id="search-input" type="text" placeholder="Buscar artigos..." class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm">
            </div>

    <!-- BLOG GRID -->
    <section class="pb-24 px-4">

            <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <h3 class="text-xl font-bold text-gray-500">Nenhum artigo encontrado</h3>
            <p class="text-gray-400 mt-2">Tente buscar por outro termo.</p>
        </div>
    </section>

    <!-- CTA -->
    <section class="py-20 px-4 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-primary to-purple-600"></div>
        <img src="images/copa.png" alt="" aria-hidden="true" class="absolute inset-0 w-full h-full object-cover pointer-events-none select-none opacity-[0.06]">
        <div class="max-w-4xl mx-auto text-center relative z-10">
            <h2 class="text-3xl lg:text-4xl font-black text-white mb-4">Tem um projeto em mente?</h2>
            <p class="text-purple-100 mb-8 text-lg">Transforme sua ideia em realidade com a Axolutions.</p>
            <a href="index.html#contato" class="bg-white text-primary px-8 py-4 rounded-full text-lg font-semibold hover:shadow-xl hover:shadow-black/20 transition-all inline-block hover:-translate-y-1">Solicitar Orçamento</a>
        </div>
    </section>

    <script>window.AXO_CONFIG = { page: 'blog', navMode: 'transparent' };</script>
    <script src="js/nav.js"></script>
    <script src="js/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/data.js"></script>
    <script>DataManager.getData(DataManager.keys.POSTS);</script>
    <script src="js/theme.js"></script>
    <script>
    (function() {
        // Scroll animations
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) { entry.target.classList.add('animate-in'); }
            });
        }, { threshold: 0.1 });

        // Render posts
        var grid = document.getElementById('posts-grid');
        var noResults = document.getElementById('no-results');
        var allPosts = [];

        function hideLoader() {
            var l = document.getElementById('axo-loader');
            if (!l) return;
            l.style.opacity = '0'; l.style.visibility = 'hidden';
            setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l); }, 420);
        }

        function sortPosts(arr) {
            return arr.slice().sort(function(a, b) {
                if (a.featured && !b.featured) return -1;
                if (!a.featured && b.featured) return 1;
                return new Date(b.date) - new Date(a.date);
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr + 'T00:00:00');
            var months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
        }

        function renderPosts(list) {
            if (list.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');
            grid.innerHTML = list.map(function(p, i) {
                var isFeatured = !!p.featured;
                var featuredBadge = isFeatured
                    ? '<div class="absolute top-3 right-3 flex items-center gap-1.5 bg-amber-400 text-amber-900 text-xs px-3 py-1.5 rounded-full font-bold shadow-lg shadow-amber-400/40">' +
                      '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' +
                      'Destaque</div>'
                    : '';
                var cardStyle = isFeatured ? ' style="outline:2px solid rgba(251,191,36,0.55);outline-offset:2px;"' : '';
                return '<article class="blog-card scroll-animate group" style="transition-delay:' + (i * 80) + 'ms">' +
                    '<a href="post.html?id=' + p.id + '" class="block bg-white rounded-2xl overflow-hidden shadow-lg border border-gray-100 hover:shadow-xl hover:shadow-primary/10 transition-all duration-300 h-full flex flex-col"' + cardStyle + '>' +
                        '<div class="h-52 relative overflow-hidden">' +
                            (p.image
                                ? '<img src="' + p.image + '" alt="' + p.title + '" class="blog-image w-full h-full object-cover">'
                                : '<div class="blog-image w-full h-full bg-gradient-to-br from-primary/20 via-purple-500/20 to-pink-500/20 flex items-center justify-center"><svg class="w-16 h-16 text-primary/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg></div>') +
                            '<div class="absolute top-3 left-3"><span class="bg-primary/10 text-primary text-xs px-3 py-1.5 rounded-full font-semibold backdrop-blur-sm">' + (p.category || 'Geral') + '</span></div>' +
                            featuredBadge +
                        '</div>' +
                        '<div class="p-6 flex flex-col flex-1">' +
                            '<div class="flex items-center gap-2 text-xs text-gray-400 mb-3">' +
                                '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' +
                                '<span>' + formatDate(p.date) + '</span>' +
                            '</div>' +
                            '<h3 class="text-lg font-bold text-gray-900 group-hover:text-primary transition-colors line-clamp-2 mb-3">' + p.title + '</h3>' +
                            '<p class="text-sm text-gray-500 line-clamp-3 flex-1">' + (p.excerpt || '') + '</p>' +
                            '<div class="mt-5 flex items-center text-primary text-sm font-semibold">' +
                                '<span>Ler artigo</span>' +
                                '<svg class="w-4 h-4 ml-1.5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>' +
                            '</div>' +
                        '</div>' +
                    '</a>' +
                '</article>';
            }).join('');

            document.querySelectorAll('.scroll-animate').forEach(function(el) { observer.observe(el); });
        }

        // Search
        var searchInput = document.getElementById('search-input');
        var debounceTimer;
        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                var q = searchInput.value.trim().toLowerCase();
                if (!q) { renderPosts(allPosts); return; }
                var filtered = allPosts.filter(function(p) {
                    return p.title.toLowerCase().indexOf(q) > -1 || (p.category && p.category.toLowerCase().indexOf(q) > -1) || (p.excerpt && p.excerpt.toLowerCase().indexOf(q) > -1);
                });
                renderPosts(filtered);
            }, 250);
        });

        function applyPosts(posts) {
            allPosts = sortPosts(posts);
            renderPosts(allPosts);
            hideLoader();
        }

        // Stale-while-revalidate
        var stale = DataManager.getStale(DataManager.keys.POSTS);
        if (stale && stale.length) applyPosts(stale);

        DataManager.getData(DataManager.keys.POSTS).then(function(fresh) {
            if (fresh && fresh.length) applyPosts(fresh);
            else if (!stale || !stale.length) applyPosts([]);
            else hideLoader();
        });
    })();
    </script>
</body>
</html>
