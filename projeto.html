<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto - Axolutions</title>
    <meta name="description" content="Detalhes do projeto desenvolvido pela Axolutions. Solucoes digitais de alto impacto.">
    <meta name="keywords" content="projeto, desenvolvimento, software, Axolutions">
    <meta property="og:title" content="Projeto - Axolutions">
    <meta property="og:description" content="Confira os detalhes deste projeto desenvolvido pela Axolutions.">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="projeto.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] },
                    colors: {
                        primary: { DEFAULT: '#8f00cc', light: '#b44ddb', dark: '#6b00a3', 50: '#f5e6ff', 100: '#e6c2ff', 200: '#cc80ff', 300: '#b34dff', 400: '#9f1aff', 500: '#8f00cc', 600: '#7300a6', 700: '#580080', 800: '#3d005a', 900: '#220033' }
                    }
                }
            }
        }
    </script>
    <style>
        .scroll-animate { opacity: 0; transform: translateY(40px); transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1); }
        .scroll-animate.animate-in { opacity: 1 !important; transform: translateY(0) !important; }
        .gradient-text { background: linear-gradient(135deg, #8f00cc 0%, #cc44ff 50%, #8f00cc 100%); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: gradientFlow 4s ease infinite; }
        @keyframes gradientFlow { 0%,100% { background-position: 0% center; } 50% { background-position: 100% center; } }
        .nav-link { position: relative; }
        .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #8f00cc; transition: width 0.3s; border-radius: 1px; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .related-card { transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s; }
        .related-card:hover { transform: translateY(-6px); }
        .related-card .related-image { transition: transform 0.6s cubic-bezier(0.16,1,0.3,1); }
        .related-card:hover .related-image { transform: scale(1.08); }
        .project-content h1 { font-size: 1.875rem; font-weight: 800; margin: 2rem 0 1rem; color: #111; }
        .project-content h2 { font-size: 1.5rem; font-weight: 700; margin: 1.75rem 0 0.75rem; color: #1a1a2e; }
        .project-content h3 { font-size: 1.25rem; font-weight: 600; margin: 1.5rem 0 0.5rem; color: #333; }
        .project-content p { margin-bottom: 1rem; line-height: 1.8; color: #4a4a4a; }
        .project-content ul, .project-content ol { margin: 0.75rem 0 1.25rem 1.5rem; color: #4a4a4a; }
        .project-content li { margin-bottom: 0.4rem; line-height: 1.7; }
        .project-content strong { color: #111; font-weight: 600; }
        .project-content blockquote { border-left: 4px solid #8f00cc; padding: 1rem 1.5rem; margin: 1.5rem 0; background: #f5e6ff; border-radius: 0 0.5rem 0.5rem 0; color: #333; }
        .project-content img { max-width: 100%; border-radius: 0.75rem; margin: 1.5rem 0; }
        .project-content a { color: #8f00cc; text-decoration: underline; }
        .project-content pre { background: #1a1a2e; color: #e0e0e0; padding: 1rem 1.5rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
        .project-content code { font-family: monospace; font-size: 0.9em; }
        .gallery-lightbox { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .gallery-lightbox.active { opacity: 1; pointer-events: auto; }
        .gallery-lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 0.75rem; }
    </style>
    <script id="schema-ld" type="application/ld+json">
    { "@context": "https://schema.org", "@type": "SoftwareApplication", "name": "", "applicationCategory": "WebApplication", "operatingSystem": "Web", "author": { "@type": "Organization", "name": "Axolutions" } }
    </script>
</head>
<body class="bg-white text-gray-900 font-sans transition-colors duration-500">


    <!-- PROJECT DETAIL -->
    <section class="pt-36 pb-8 px-4 relative overflow-hidden">
        <div class="absolute top-20 left-1/2 -translate-x-1/2 w-[600px] h-[600px] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
        <div class="max-w-4xl mx-auto relative z-10">
            <!-- Back link -->
            <a href="projetos.html" class="inline-flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-primary transition-colors mb-8 group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
                <span>Voltar aos projetos</span>
            </a>

            <div id="project-detail">
                <!-- Content injected by JS -->
            </div>

            <div id="project-not-found" class="hidden text-center py-20">
                <svg class="w-20 h-20 text-gray-300 mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                <h2 class="text-2xl font-bold text-gray-500 mb-2">Projeto nao encontrado</h2>
                <p class="text-gray-400 mb-8">O projeto que voce procura nao existe ou foi removido.</p>
                <a href="projetos.html" class="inline-flex items-center gap-2 bg-primary hover:bg-primary-dark text-white px-6 py-3 rounded-full text-sm font-semibold transition-all hover:shadow-lg hover:shadow-primary/25">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
                    Ver todos os projetos
                </a>
            </div>
        </div>
    </section>

    <!-- RELATED PROJECTS -->
    <section id="related-section" class="hidden pb-24 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="border-t border-gray-200 pt-16 mb-10">
                <h2 class="text-2xl lg:text-3xl font-black text-center">Outros <span class="gradient-text">Projetos</span></h2>
                <p class="text-gray-500 text-center mt-3">Confira mais trabalhos da Axolutions</p>
            </div>
            <div id="related-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-5xl mx-auto"></div>
        </div>
    </section>

    <!-- GALLERY LIGHTBOX -->
    <div id="lightbox" class="gallery-lightbox" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="" alt="Gallery image">
        <button onclick="event.stopPropagation();document.getElementById('lightbox').classList.remove('active')" class="absolute top-6 right-6 text-white text-4xl leading-none hover:text-gray-300">&times;</button>
    </div>

    <!-- CTA -->
    <section class="py-20 px-4 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-primary to-purple-600"></div>
        <img src="images/copa.png" alt="" aria-hidden="true" class="absolute inset-0 w-full h-full object-cover pointer-events-none select-none opacity-[0.06]">
        <div class="max-w-4xl mx-auto text-center relative z-10">
            <h2 class="text-3xl lg:text-4xl font-black text-white mb-4">Tem um projeto em mente?</h2>
            <p class="text-purple-100 mb-8 text-lg">Transforme sua ideia em realidade com a Axolutions.</p>
            <a href="index.html#contato" class="bg-white text-primary px-8 py-4 rounded-full text-lg font-semibold hover:shadow-xl hover:shadow-black/20 transition-all inline-block hover:-translate-y-1">Solicitar Orçamento</a>
        </div>
    </section>

    <script>window.AXO_CONFIG = { page: 'projetos', navMode: 'white' };</script>
    <script src="js/nav.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/data.js"></script>
    <script src="js/theme.js"></script>
    <script>
    (function() {
        // Scroll animations
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) { entry.target.classList.add('animate-in'); }
            });
        }, { threshold: 0.1 });

        // Get project ID from URL
        var id = new URLSearchParams(window.location.search).get('id');
        var detailEl = document.getElementById('project-detail');
        var notFoundEl = document.getElementById('project-not-found');

        if (!id) {
            detailEl.classList.add('hidden');
            notFoundEl.classList.remove('hidden');
            return;
        }

        var project = DataManager.getItem(DataManager.keys.PROJECTS, id);

        if (!project) {
            detailEl.classList.add('hidden');
            notFoundEl.classList.remove('hidden');
            return;
        }

        // Update page title and meta
        document.title = project.title + ' - Axolutions';
        var metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute('content', project.description || '');
        var ogTitle = document.querySelector('meta[property="og:title"]');
        if (ogTitle) ogTitle.setAttribute('content', project.title + ' - Axolutions');
        var ogDesc = document.querySelector('meta[property="og:description"]');
        if (ogDesc) ogDesc.setAttribute('content', project.description || '');

        // Update JSON-LD schema
        var schemaEl = document.getElementById('schema-ld');
        if (schemaEl) {
            var schema = JSON.parse(schemaEl.textContent);
            schema.name = project.title;
            schema.description = project.description || '';
            if (project.category) schema.applicationCategory = project.category;
            if (project.image) schema.image = project.image;
            if (project.link) schema.url = project.link;
            schemaEl.textContent = JSON.stringify(schema);
        }

        // Build project detail HTML
        var imageHtml = '';
        if (project.image) {
            imageHtml = '<div class="rounded-2xl overflow-hidden shadow-2xl shadow-primary/10 mb-10 scroll-animate">' +
                '<img src="' + project.image + '" alt="' + project.title + '" class="w-full h-auto max-h-[500px] object-cover">' +
            '</div>';
        } else {
            imageHtml = '<div class="rounded-2xl overflow-hidden shadow-2xl shadow-primary/10 mb-10 scroll-animate">' +
                '<div class="w-full h-72 bg-gradient-to-br from-primary/20 via-purple-500/20 to-pink-500/20 flex items-center justify-center">' +
                    '<svg class="w-24 h-24 text-primary/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>' +
                '</div>' +
            '</div>';
        }

        var techHtml = '';
        if (project.techs && project.techs.length) {
            techHtml = '<div class="flex flex-wrap gap-2.5 mb-8 scroll-animate">' +
                project.techs.map(function(t) {
                    return '<span class="text-sm px-4 py-2 rounded-full bg-primary/10 text-primary font-semibold">' + t + '</span>';
                }).join('') +
            '</div>';
        }

        // Meta info (client, date)
        var metaHtml = '';
        if (project.client || project.date) {
            var metaItems = [];
            if (project.client) metaItems.push('<span class="flex items-center gap-1.5"><svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>' + project.client + '</span>');
            if (project.date) metaItems.push('<span class="flex items-center gap-1.5"><svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' + project.date + '</span>');
            metaHtml = '<div class="flex flex-wrap gap-6 text-sm text-gray-500 mb-8 scroll-animate">' + metaItems.join('') + '</div>';
        }

        var linkHtml = '';
        if (project.link) {
            linkHtml = '<a href="' + project.link + '" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2.5 bg-primary hover:bg-primary-dark text-white px-8 py-3.5 rounded-full text-sm font-semibold transition-all hover:shadow-lg hover:shadow-primary/25 hover:-translate-y-0.5 scroll-animate">' +
                '<span>Visitar Projeto</span>' +
                '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>' +
            '</a>';
        }

        // Rich content section
        var contentHtml = '';
        var hasContent = project.content && project.content !== '<p><br></p>' && project.content.replace(/<[^>]*>/g,'').trim().length > 0;
        if (hasContent) {
            contentHtml = '<div class="bg-white rounded-2xl border border-gray-100 p-8 lg:p-10 mb-8 scroll-animate">' +
                '<div class="project-content">' + project.content + '</div>' +
            '</div>';
        } else {
            contentHtml = '<div class="bg-white rounded-2xl border border-gray-100 p-8 lg:p-10 mb-8 scroll-animate">' +
                '<h2 class="text-xl font-display font-bold mb-4 text-gray-900">Sobre o Projeto</h2>' +
                '<p class="text-gray-600 leading-relaxed text-lg">' + (project.description || 'Sem descricao disponivel.') + '</p>' +
            '</div>';
        }

        // Gallery section
        var galleryHtml = '';
        if (project.gallery && project.gallery.length) {
            galleryHtml = '<div class="mb-10 scroll-animate">' +
                '<h2 class="text-xl font-display font-bold mb-5 text-gray-900">Galeria</h2>' +
                '<div class="grid grid-cols-2 md:grid-cols-3 gap-4">' +
                project.gallery.map(function(img, i) {
                    return '<div class="rounded-xl overflow-hidden cursor-pointer hover:shadow-lg transition-shadow" onclick="document.getElementById(\'lightbox-img\').src=\'' + img + '\';document.getElementById(\'lightbox\').classList.add(\'active\')">' +
                        '<img src="' + img + '" alt="Galeria ' + (i+1) + '" class="w-full h-48 object-cover hover:scale-105 transition-transform duration-300">' +
                    '</div>';
                }).join('') +
            '</div></div>';
        }

        detailEl.innerHTML =
            '<div class="mb-6 scroll-animate">' +
                '<span class="inline-block bg-primary/10 text-primary text-xs px-4 py-1.5 rounded-full font-semibold uppercase tracking-wider mb-5">' + (project.category || 'Projeto') + '</span>' +
                '<h1 class="text-4xl lg:text-5xl font-display font-black leading-tight">' + project.title + '</h1>' +
            '</div>' +
            metaHtml +
            imageHtml +
            contentHtml +
            techHtml +
            galleryHtml +
            linkHtml;

        // Observe scroll animations
        document.querySelectorAll('.scroll-animate').forEach(function(el) { observer.observe(el); });

        // Related projects
        var allProjects = DataManager.getData(DataManager.keys.PROJECTS).filter(function(p) { return p.status !== 'draft'; });
        var related = allProjects.filter(function(p) { return p.id !== id; }).slice(0, 3);

        if (related.length > 0) {
            var relatedSection = document.getElementById('related-section');
            var relatedGrid = document.getElementById('related-grid');
            relatedSection.classList.remove('hidden');

            relatedGrid.innerHTML = related.map(function(p, i) {
                var rTechHtml = '';
                if (p.techs && p.techs.length) {
                    rTechHtml = '<div class="flex flex-wrap gap-2 mt-4">' + p.techs.map(function(t) {
                        return '<span class="text-xs px-2.5 py-1 rounded-full bg-primary/10 text-primary font-medium">' + t + '</span>';
                    }).join('') + '</div>';
                }
                return '<article class="related-card scroll-animate group" style="transition-delay:' + (i * 100) + 'ms">' +
                    '<div class="bg-white rounded-2xl overflow-hidden shadow-lg border border-gray-100 hover:shadow-xl hover:shadow-primary/10 transition-all duration-300 h-full flex flex-col">' +
                        '<div class="h-48 relative overflow-hidden">' +
                            (p.image
                                ? '<img src="' + p.image + '" alt="' + p.title + '" class="related-image w-full h-full object-cover">'
                                : '<div class="related-image w-full h-full bg-gradient-to-br from-primary/20 via-purple-500/20 to-pink-500/20 flex items-center justify-center"><svg class="w-14 h-14 text-primary/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>') +
                            '<div class="absolute top-3 left-3"><span class="bg-primary/10 text-primary text-xs px-3 py-1.5 rounded-full font-semibold backdrop-blur-sm">' + (p.category || 'Geral') + '</span></div>' +
                        '</div>' +
                        '<div class="p-6 flex flex-col flex-1">' +
                            '<a href="projeto.html?id=' + p.id + '" class="block">' +
                                '<h3 class="text-lg font-bold text-gray-900 group-hover:text-primary transition-colors line-clamp-2 mb-3">' + p.title + '</h3>' +
                            '</a>' +
                            '<p class="text-sm text-gray-500 line-clamp-3 flex-1">' + (p.description || '') + '</p>' +
                            rTechHtml +
                            '<div class="mt-5 pt-4 border-t border-gray-100">' +
                                '<a href="projeto.html?id=' + p.id + '" class="flex items-center text-primary text-sm font-semibold group/link">' +
                                    '<span>Ver detalhes</span>' +
                                    '<svg class="w-4 h-4 ml-1.5 group-hover/link:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>' +
                                '</a>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                '</article>';
            }).join('');

            document.querySelectorAll('.scroll-animate').forEach(function(el) { observer.observe(el); });
        }
    })();
    </script>
</body>
</html>
