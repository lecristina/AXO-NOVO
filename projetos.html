    <!-- ▼ RENDERING runs BEFORE SDK — zero external dependencies ▼ -->
    <script>
    (function() {
        var grid = document.getElementById('projects-grid');
        var noResults = document.getElementById('no-results');
        var filterContainer = document.getElementById('filter-btns');
        var activeFilter = 'all';
        var projects = [];

        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) entry.target.classList.add('animate-in');
            });
        }, { threshold: 0.1 });

        function _esc(s) {
            return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        var _CARD_GRADIENTS = [
            'from-purple-600/30 via-violet-500/20 to-fuchsia-500/20',
            'from-blue-600/30 via-cyan-500/20 to-sky-500/20',
            'from-emerald-600/30 via-teal-500/20 to-green-500/20',
            'from-rose-600/30 via-pink-500/20 to-red-500/20',
            'from-amber-600/30 via-orange-500/20 to-yellow-500/20',
            'from-indigo-600/30 via-blue-500/20 to-purple-500/20',
            'from-teal-600/30 via-emerald-500/20 to-cyan-500/20',
            'from-fuchsia-600/30 via-pink-500/20 to-purple-500/20'
        ];
        var _CARD_ICONS = [
            'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9',
            'M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z',
            'M13 10V3L4 14h7v7l9-11h-7z',
            'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z',
            'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6',
            'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4',
            'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z',
            'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'
        ];

        function buildFilters(list) {
            filterContainer.querySelectorAll('.filter-btn[data-filter]:not([data-filter="all"])').forEach(function(b) { b.remove(); });
            var categories = [];
            list.forEach(function(p) {
                if (p.category && categories.indexOf(p.category) === -1) categories.push(p.category);
            });
            categories.forEach(function(cat) {
                var btn = document.createElement('button');
                btn.setAttribute('data-filter', cat);
                btn.className = 'filter-btn bg-gray-100 text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary';
                btn.textContent = cat;
                filterContainer.appendChild(btn);
            });
        }

        function renderProjects() {
            var filtered = activeFilter === 'all' ? projects : projects.filter(function(p) { return p.category === activeFilter; });
            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');
            grid.innerHTML = filtered.map(function(p, i) {
                var techHtml = '';
                if (p.techs && p.techs.length) {
                    techHtml = '<div class="flex flex-wrap gap-2 mt-4">' + p.techs.map(function(t) {
                        return '<span class="text-xs px-2.5 py-1 rounded-full bg-primary/10 text-primary font-medium">' + _esc(t) + '</span>';
                    }).join('') + '</div>';
                }
                var safeTitle = _esc(p.title);
                var grad = _CARD_GRADIENTS[i % _CARD_GRADIENTS.length];
                var icon = _CARD_ICONS[i % _CARD_ICONS.length];
                var thumbnail = p.image
                    ? '<img src="' + _esc(p.image) + '" alt="' + safeTitle + '" class="project-image w-full h-full object-cover"' + (i < 3 ? ' fetchpriority="high"' : '') + ' decoding="async">'
                    : '<div class="project-image w-full h-full bg-gradient-to-br ' + grad + ' flex items-center justify-center"><svg class="w-16 h-16 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="' + icon + '"/></svg></div>';
                /* First 6 cards (visible viewport) render instantly — no scroll-animate delay */
                var animClass = i < 6 ? 'group' : 'scroll-animate group';
                return '<article class="project-card ' + animClass + '">' +
                    '<div class="bg-white rounded-2xl overflow-hidden shadow-lg border border-gray-100 hover:shadow-xl hover:shadow-primary/10 transition-all duration-300 h-full flex flex-col">' +
                        '<div class="h-56 relative overflow-hidden">' +
                            thumbnail +
                            '<div class="project-overlay absolute inset-0 bg-primary/60 flex items-center justify-center">' +
                                '<a href="projeto.html?id=' + p.id + '" class="bg-white text-primary px-6 py-2.5 rounded-full text-sm font-semibold hover:shadow-lg transition-all transform hover:scale-105">Ver Projeto</a>' +
                            '</div>' +
                            '<div class="absolute top-3 left-3"><span class="bg-primary/10 text-primary text-xs px-3 py-1.5 rounded-full font-semibold backdrop-blur-sm">' + _esc(p.category || 'Geral') + '</span></div>' +
                        '</div>' +
                        '<div class="p-6 flex flex-col flex-1">' +
                            '<a href="projeto.html?id=' + p.id + '" class="block">' +
                                '<h3 class="text-lg font-bold text-gray-900 group-hover:text-primary transition-colors line-clamp-2 mb-3">' + safeTitle + '</h3>' +
                            '</a>' +
                            '<p class="text-sm text-gray-500 line-clamp-3 flex-1">' + _esc(p.description || '') + '</p>' +
                            techHtml +
                            '<div class="mt-5 pt-4 border-t border-gray-100">' +
                                '<a href="projeto.html?id=' + p.id + '" class="flex items-center text-primary text-sm font-semibold group/link">' +
                                    '<span>Ver detalhes</span>' +
                                    '<svg class="w-4 h-4 ml-1.5 group-hover/link:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>' +
                                '</a>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                '</article>';
            }).join('');
            grid.querySelectorAll('.scroll-animate').forEach(function(el) { observer.observe(el); });
        }

        filterContainer.addEventListener('click', function(e) {
            var btn = e.target.closest('.filter-btn');
            if (!btn) return;
            activeFilter = btn.getAttribute('data-filter');
            filterContainer.querySelectorAll('.filter-btn').forEach(function(b) {
                b.className = 'filter-btn bg-gray-100 text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300 hover:bg-primary hover:text-white hover:border-primary';
            });
            btn.className = 'filter-btn active bg-primary text-white px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300';
            renderProjects();
        });

        function applyData(raw) {
            projects = (raw || []).filter(function(p) { return p.status !== 'draft'; });
            projects.sort(function(a, b) { return (a.position || 0) - (b.position || 0); });
            /* Normalize techs (may be JSON string from REST) */
            projects.forEach(function(p) {
                if (typeof p.techs === 'string') { try { p.techs = JSON.parse(p.techs); } catch(e) { p.techs = []; } }
                if (!Array.isArray(p.techs)) p.techs = [];
            });
            buildFilters(projects);
            renderProjects();
        }

        /* ── Direct localStorage stale read — zero SDK dependency ── */
        var stale = null;
        try {
            var _raw = localStorage.getItem('axo_projects_list');
            if (_raw) { stale = JSON.parse(_raw).data; }
        } catch(e) {}

        if (stale && stale.length) {
            applyData(stale);
        } else {
            grid.innerHTML = [0,1,2,3,4,5].map(function() {
                return '<div class="animate-pulse">' +
                    '<div class="h-56 bg-gray-200 rounded-2xl mb-4"></div>' +
                    '<div class="h-3 bg-gray-200 rounded w-1/4 mb-3"></div>' +
                    '<div class="h-5 bg-gray-200 rounded w-3/4 mb-2"></div>' +
                    '<div class="h-4 bg-gray-200 rounded w-full mb-1"></div>' +
                    '</div>';
            }).join('');
        }

        /* ── Fresh data from head-prefetch (fires before SDK loads) ── */
        (window.__axo_proj_pf || Promise.resolve([])).then(function(fresh) {
            if (fresh && fresh.length) {
                applyData(fresh);
                /* Persist slim copy to stale cache → instant on next visit */
                try {
                    var slim = fresh.map(function(item) {
                        var s = {};
                        for (var k in item) { if (k !== 'content' && k !== 'gallery' && k !== 'cover' && k !== 'gif') s[k] = item[k]; }
                        return s;
                    });
                    var payload = JSON.stringify({ data: slim, ts: Date.now() });
                    if (payload.length < 1048576) localStorage.setItem('axo_projects_list', payload);
                } catch(e) {}
            } else if (!stale || !stale.length) {
                applyData([]);
            }
        });
    })();
    </script>
    <!-- SDK & data layer load AFTER content is already visible -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <script src="js/theme.js"></script>
